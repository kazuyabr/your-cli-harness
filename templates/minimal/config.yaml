name: {{client-name}}
command: {{client-name}}
version: 0.1.0
description: "{{client-name}} AI CLI"

llm:
  provider: anthropic
  model: claude-sonnet-4-20250514
  maxTokens: 8192
  temperature: 0.7

modes:
  plan:
    enabled: true
    readOnly: true
    autoExecute: false
    requireConfirmation: true
  build:
    enabled: true
    readOnly: false
    autoExecute: true
    requireConfirmation: false
  yolo:
    enabled: false
  default:
    enabled: true

memory:
  auto:
    enabled: true
  vector:
    provider: none
    indexer:
      sources: []

mcp:
  servers: []

branding:
  theme: professional
